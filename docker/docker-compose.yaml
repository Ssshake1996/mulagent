services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mulagent
      POSTGRES_PASSWORD: mulagent
      POSTGRES_DB: mulagent
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mulagent"]
      interval: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      retries: 3

  # ── Application services ──

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["api"]
    ports:
      - "8000:8000"
    volumes:
      - ../config:/app/config:ro
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["bot"]
    volumes:
      - ../config:/app/config:ro
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  qdrant_data:
  app_data:
