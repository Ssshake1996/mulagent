name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: mulagent
          POSTGRES_PASSWORD: mulagent
          POSTGRES_DB: mulagent
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        env:
          PYTHONPATH: src
          DATABASE_URL: "postgresql+asyncpg://mulagent:mulagent@localhost:5432/mulagent"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          pytest tests/unit/ -v --tb=short --co -q 2>/dev/null || true
          pytest tests/unit/ -v --tb=short -x --timeout=60

      - name: Run integration tests
        env:
          PYTHONPATH: src
          DATABASE_URL: "postgresql+asyncpg://mulagent:mulagent@localhost:5432/mulagent"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          pytest tests/integration/ -v --tb=short -x --timeout=120 || true

      - name: Test coverage
        env:
          PYTHONPATH: src
        run: |
          pytest tests/unit/ --cov=src --cov-report=term-missing --cov-fail-under=40 --timeout=60 || true

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        run: |
          if [ -f Dockerfile ]; then
            echo "Dockerfile found"
            docker build --target=base . -t mul-agent:ci-test || echo "Docker build skipped (no multi-stage)"
          else
            echo "No Dockerfile, skipping docker build"
          fi
